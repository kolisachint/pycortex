[project]
name = "cortexcode-ai-stream"
version = "0.0.2"
description = "Cortex AI leaf: stream"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cortexcode-ai-types>=0.0.2,<0.1.0",
    "cortexcode-ai-models>=0.0.2,<0.1.0",
    "cortexcode-ai-util>=0.0.2,<0.1.0",
    "cortexcode-ai-env>=0.0.2,<0.1.0",
]

[tool.cortex]
publish = false

[tool.hatch.build.targets.wheel]
packages = [
    "src/cortex",
]

[tool.uv.sources.cortexcode-ai-types]
workspace = true

[tool.uv.sources.cortexcode-ai-models]
workspace = true

[tool.uv.sources.cortexcode-ai-util]
workspace = true

[tool.uv.sources.cortexcode-ai-env]
workspace = true

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"
