[project]
name = "cortexcode-ai-provider-faux"
version = "0.0.1"
description = "Cortex AI leaf: provider-faux"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cortexcode-ai-stream>=0.0.1,<0.1.0",
    "cortexcode-ai-types>=0.0.1,<0.1.0",
]

[tool.cortex]
publish = false

[tool.hatch.build.targets.wheel]
packages = [
    "src/cortex",
]

[tool.uv.sources.cortexcode-ai-stream]
workspace = true

[tool.uv.sources.cortexcode-ai-types]
workspace = true

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"
