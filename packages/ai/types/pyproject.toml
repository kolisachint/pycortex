[project]
name = "cortexcode-ai-types"
version = "0.0.3"
description = "Cortex AI leaf: types"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
]

[tool.cortex]
publish = true

[tool.hatch.build.targets.wheel]
packages = [
    "src/cortex",
]

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"
