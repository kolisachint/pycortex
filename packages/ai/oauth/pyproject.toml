[project]
name = "cortexcode-ai-oauth"
version = "0.0.1"
description = "Cortex AI leaf: oauth"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cortexcode-ai-types>=0.0.1,<0.1.0",
    "httpx>=0.27",
]

[tool.cortex]
publish = false

[tool.hatch.build.targets.wheel]
packages = [
    "src/cortex",
]

[tool.uv.sources.cortexcode-ai-types]
workspace = true

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"
