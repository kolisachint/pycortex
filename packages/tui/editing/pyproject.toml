[project]
name = "cortexcode-tui-editing"
version = "0.0.3"
description = "Cortex TUI leaf: editing"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cortexcode-tui-render",
]

[tool.cortex]
publish = false

[tool.hatch.build.targets.wheel]
packages = [
    "src/cortex",
]

[tool.uv.sources]
cortexcode-tui-render = { workspace = true }

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"
