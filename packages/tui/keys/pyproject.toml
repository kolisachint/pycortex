[project]
name = "cortexcode-tui-keys"
version = "0.0.3"
description = "Cortex TUI leaf: keys"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cortexcode-tui-util>=0.0.1,<0.1.0",
]

[tool.cortex]
publish = false

[tool.hatch.build.targets.wheel]
packages = [
    "src/cortex",
]

[tool.uv.sources.cortexcode-tui-util]
workspace = true

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"
