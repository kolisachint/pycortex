[project]
name = "cortexcode-tui"
version = "0.0.1"
description = "Terminal UI toolkit for cortex (differential renderer, components)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[tool.cortex]
publish = false

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex"]
