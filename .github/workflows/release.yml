name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        type: choice
        options: [patch, minor, major]
  workflow_call:
    inputs:
      level:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Gates
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright packages
          uv run pytest || { c=$?; [ "$c" -eq 5 ] && echo "no tests yet" || exit "$c"; }
      - name: Bump versions
        id: bump
        run: |
          version=$(uv run scripts/bump_versions.py "${{ inputs.level }}" | tail -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main "v${{ steps.bump.outputs.version }}"
      - name: Build and publish to PyPI
        run: |
          uv build --all-packages
          uv run scripts/publish_packages.py
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      - name: GitHub release
        run: gh release create "v${{ steps.bump.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
